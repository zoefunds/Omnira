# Local test infra for `pnpm test` and `pnpm --filter @omnira/e2e test`.
# Bring it up with:
#
#   docker compose -f docker-compose.test.yml up -d
#   PROD_DB="postgresql://omnira:omnira@localhost:5544/omnira_test" \
#     pnpm --filter @omnira/db exec prisma migrate deploy
#
# Tear down with:
#
#   docker compose -f docker-compose.test.yml down -v
#
# Ports are deliberately offset from defaults (5544 / 6399) so they do not
# collide with anything you might already have running.

services:
  postgres:
    image: postgres:15-alpine
    container_name: omnira-test-postgres
    environment:
      POSTGRES_USER: omnira
      POSTGRES_PASSWORD: omnira
      POSTGRES_DB: omnira_test
    ports:
      - "5544:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U omnira -d omnira_test"]
      interval: 1s
      timeout: 5s
      retries: 30
    tmpfs:
      - /var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: omnira-test-redis
    ports:
      - "6399:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1s
      timeout: 3s
      retries: 30
