# Omnira — nginx reverse proxy
# Place at /etc/nginx/sites-available/omnira.conf and symlink to sites-enabled.
# Assumes 3 local processes:
#   - apps/web on 127.0.0.1:3000  (Next.js)
#   - apps/api on 127.0.0.1:4000  (Fastify + Socket.IO)
# TLS: use certbot (apt install certbot python3-certbot-nginx; certbot --nginx -d omnira.app).

upstream omnira_web { server 127.0.0.1:3000; keepalive 64; }
upstream omnira_api { server 127.0.0.1:4000; keepalive 64; }

# Allow Socket.IO WebSocket upgrades
map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

# Cap upload size (chat, etc.)
client_max_body_size 1m;

# Modest rate-limiting at the proxy level too (defense-in-depth on top of fastify-rate-limit)
limit_req_zone $binary_remote_addr zone=auth:10m rate=10r/m;
limit_req_zone $binary_remote_addr zone=general:10m rate=120r/m;

server {
    listen 80;
    listen [::]:80;
    server_name omnira.app www.omnira.app;

    # ACME challenge passthrough (for certbot)
    location /.well-known/acme-challenge/ { root /var/www/letsencrypt; }

    location / { return 301 https://$host$request_uri; }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name omnira.app www.omnira.app;

    # ───── TLS ──────────────────────────────────────────
    # certbot will fill these in; sample paths:
    ssl_certificate     /etc/letsencrypt/live/omnira.app/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/omnira.app/privkey.pem;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    # ───── Security headers (helmet already adds many on the API) ──────
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header Referrer-Policy strict-origin-when-cross-origin always;
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;

    # ───── Logging ─────────────────────────────────────
    access_log /var/log/nginx/omnira.access.log;
    error_log  /var/log/nginx/omnira.error.log warn;

    # ───── API routes ──────────────────────────────────
    # auth gets tight per-IP throttle
    location ~ ^/auth/(signup|login) {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass         http://omnira_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # all other API routes
    location ~ ^/(auth|users|match|matches|tournaments|challenges|puzzles|admin|health) {
        limit_req zone=general burst=40 nodelay;
        proxy_pass         http://omnira_api;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ───── Socket.IO (WebSocket) ───────────────────────
    location /socket.io/ {
        proxy_pass         http://omnira_api;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection $connection_upgrade;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 3600s;   # keep WS connections alive
    }

    # ───── Next.js static + SSR ────────────────────────
    location /_next/static/ {
        proxy_pass http://omnira_web;
        proxy_cache_valid 200 365d;
        expires 365d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        proxy_pass         http://omnira_web;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }
}
